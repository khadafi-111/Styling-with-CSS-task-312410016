<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">

<style>
.login-box {
  max-width: 400px;
  margin: 40px auto;
}
</style>
</head>

<body class="w3-light-grey">

<div class="w3-container login-box">

  <div class="w3-card w3-padding w3-white">

    <h2><b>Login</b></h2>
    <p>Please, Register or Login to our site first !</p>

    <label><b>User ID</b></label>
    <input class="w3-input w3-border w3-margin-bottom" type="text" placeholder="Enter User ID">

    <label><b>Passcode</b></label>
    <input class="w3-input w3-border w3-margin-bottom" type="password" placeholder="Enter Passcode">

    <button class="w3-button w3-green">SignIn</button>

  </div>

</div>

</body>
</html>
