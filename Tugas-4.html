<!DOCTYPE html>
<html>
<title>W3.CSS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">

<body>

<div class="w3-container">

  <table class="w3-table-all w3-hoverable">
    <thead>
      <tr class="w3-white">
        <th>No.</th>
        <th>Merk</th>
        <th>Achievement Progress</th>
      </tr>
    </thead>

    <tr>
      <td>1</td>
      <td>Volvo</td>
      <td>
        <div class="w3-light-grey">
          <div class="w3-blue" style="height:24px;width:88.89%"></div>
        </div>
      </td>
    </tr>

    <tr>
      <td>2</td>
      <td>BMW</td>
      <td>
        <div class="w3-light-grey">
          <div class="w3-green" style="height:24px;width:66.67%"></div>
        </div>
      </td>
    </tr>

    <tr>
      <td>3</td>
      <td>Saab</td>
      <td>
        <div class="w3-light-grey">
          <div class="w3-red" style="height:24px;width:33.33%"></div>
        </div>
      </td>
    </tr>

    <tr>
      <td>4</td>
      <td>Land Rover</td>
      <td>
        <div class="w3-light-grey">
          <div class="w3-yellow" style="height:24px;width:41.18%"></div>
        </div>
      </td>
    </tr>

  </table>

</div>

</body>
</html>
